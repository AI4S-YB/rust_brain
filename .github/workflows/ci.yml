name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Check workspace
        run: cargo check --workspace

      - name: Run tests
        run: cargo test --workspace

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-clippy-

      - name: Clippy
        run: >
          cargo clippy
          -p rb-core -p rb-app -p rb-qc -p rb-trimming -p rb-deseq2
          -p rb-star-index -p rb-star-align
          -- -D warnings
        env:
          RUSTFLAGS: "--cap-lints=warn"

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt -p rb-core -p rb-app -p rb-qc -p rb-trimming -p rb-deseq2 -p rb-star-index -p rb-star-align -- --check

  build-and-release:
    name: Build & Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [check, clippy, fmt]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-tauri-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-tauri-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Download bundled STAR_rs binary
        shell: bash
        env:
          STAR_VERSION: v0.2.2
        run: |
          mkdir -p crates/rb-app/binaries
          case "${{ runner.os }}" in
            Linux)
              URL="https://github.com/AI4S-YB/STAR_rs/releases/download/${STAR_VERSION}/star-${STAR_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
              curl -fsSL "$URL" | tar xz -C crates/rb-app/binaries
              chmod +x crates/rb-app/binaries/star
              ;;
            macOS)
              URL="https://github.com/AI4S-YB/STAR_rs/releases/download/${STAR_VERSION}/star-${STAR_VERSION}-aarch64-apple-darwin.tar.gz"
              curl -fsSL "$URL" | tar xz -C crates/rb-app/binaries
              chmod +x crates/rb-app/binaries/star
              ;;
            Windows)
              URL="https://github.com/AI4S-YB/STAR_rs/releases/download/${STAR_VERSION}/star-${STAR_VERSION}-x86_64-pc-windows-msvc.zip"
              curl -fsSL -o /tmp/star.zip "$URL"
              unzip -o -d crates/rb-app/binaries /tmp/star.zip
              ;;
          esac
          ls -la crates/rb-app/binaries/

      - name: Build Tauri app
        working-directory: crates/rb-app
        run: cargo tauri build

      - name: Collect release artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p release
          cp target/release/bundle/deb/*.deb release/ 2>/dev/null || true
          cp target/release/bundle/appimage/*.AppImage release/ 2>/dev/null || true

      - name: Collect release artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p release
          cp target/release/bundle/dmg/*.dmg release/ 2>/dev/null || true

      - name: Collect release artifacts (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p release
          cp target/release/bundle/msi/*.msi release/ 2>/dev/null || true
          cp target/release/bundle/nsis/*.exe release/ 2>/dev/null || true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
