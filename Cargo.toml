[workspace]
resolver = "2"
members = [
    "crates/rb-core",
    "crates/rb-app",
    "crates/rb-qc",
    "crates/rb-trimming",
    "crates/rb-deseq2",
]

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync"] }
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4"] }
thiserror = "2"
