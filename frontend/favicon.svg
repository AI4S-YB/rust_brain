<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="RustBrain">
  <title>RustBrain</title>
  <desc>Sculpted capital R with a cerebral gyrus counter on a teal squircle.</desc>

  <!-- Squircle tile (iOS-style superellipse approximation) -->
  <path fill="#0d7377" d="M 256 0 C 384 0 448 0 480 32 C 512 64 512 128 512 256 C 512 384 512 448 480 480 C 448 512 384 512 256 512 C 128 512 64 512 32 480 C 0 448 0 384 0 256 C 0 128 0 64 32 32 C 64 0 128 0 256 0 Z"/>

  <!-- Subtle top-edge inner highlight for dimensional presence -->
  <path fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2" d="M 80 10 C 128 2 200 0 256 0 C 312 0 384 2 432 10"/>

  <!-- R glyph body, cream on teal -->
  <g fill="#f8f5f0">
    <!-- Vertical stem -->
    <rect x="108" y="80" width="76" height="352"/>

    <!-- Top slab (subtle extension at the top of the stem) -->
    <rect x="88" y="80" width="108" height="24"/>

    <!-- Bottom-left slab (wider base under stem) -->
    <rect x="72" y="408" width="144" height="24"/>

    <!-- Bottom-right slab (base under leg) -->
    <rect x="288" y="408" width="128" height="24"/>

    <!-- Bowl with brain-fold counter cut out via even-odd fill -->
    <path fill-rule="evenodd" d="
      M 184 80
      L 280 80
      C 360 80 404 124 404 188
      C 404 252 344 288 280 288
      L 184 288
      Z
      M 232 148
      C 232 120 282 116 302 144
      C 316 164 330 168 336 188
      C 344 212 334 240 298 248
      C 268 254 238 252 224 232
      C 208 208 212 188 220 176
      C 228 164 228 156 232 148
      Z"/>

    <!-- Leg: parallelogram tilted right with an inward curve on the inside -->
    <path d="
      M 184 260
      L 256 260
      L 376 412
      L 304 412
      C 248 332 212 288 184 272
      Z"/>
  </g>

  <!-- Coral hairline tracing the fold between the two lobes -->
  <path fill="none" stroke="#c9503c" stroke-width="8" stroke-linecap="round" d="M 236 184 C 256 176 286 174 312 188"/>

  <!-- Well-plate corner constellation (reads only at >=128px; auto-fades at small sizes) -->
  <g fill="#f8f5f0" fill-opacity="0.35">
    <circle cx="420" cy="420" r="5"/>
    <circle cx="448" cy="420" r="5"/>
    <circle cx="420" cy="448" r="5"/>
    <circle cx="448" cy="448" r="5"/>
  </g>
</svg>
